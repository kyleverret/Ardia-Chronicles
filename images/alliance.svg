<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="allianceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a0a30;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="sealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a227;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#allianceBg)"/>
  <!-- Great hall interior -->
  <rect x="0" y="0" width="150" height="450" fill="#0d0d1a"/>
  <rect x="650" y="0" width="150" height="450" fill="#0d0d1a"/>
  <!-- Pillars -->
  <rect x="60" y="50" width="30" height="400" fill="#1a1a2a"/>
  <rect x="710" y="50" width="30" height="400" fill="#1a1a2a"/>
  <!-- Stained glass windows -->
  <rect x="65" y="60" width="20" height="60" fill="#4a00aa" opacity="0.8" rx="10"/>
  <rect x="715" y="60" width="20" height="60" fill="#4a00aa" opacity="0.8" rx="10"/>
  <!-- Flags - Elven (left) -->
  <rect x="200" y="50" width="8" height="120" fill="#c9a227"/>
  <polygon points="208,50 280,75 208,100" fill="#004400"/>
  <text x="220" y="80" font-size="16" fill="#00ff44">✦</text>
  <!-- Flags - Dwarven (right) -->
  <rect x="590" y="50" width="8" height="120" fill="#c9a227"/>
  <polygon points="590,50 518,75 590,100" fill="#442200"/>
  <text x="530" y="80" font-size="16" fill="#cc6600">⚒</text>
  <!-- Ceremonial table -->
  <rect x="200" y="280" width="400" height="25" fill="#3a2a10" stroke="#c9a227" stroke-width="2"/>
  <rect x="220" y="305" width="20" height="60" fill="#2a1a08"/>
  <rect x="560" y="305" width="20" height="60" fill="#2a1a08"/>
  <!-- Treaty document on table -->
  <rect x="330" y="250" width="140" height="100" fill="#e8d5a0" rx="5"/>
  <rect x="335" y="258" width="130" height="85" fill="#fffde8" rx="3"/>
  <!-- Wax seal glow -->
  <circle cx="400" cy="295" r="25" fill="url(#sealGlow)"/>
  <circle cx="400" cy="295" r="15" fill="#8b0000"/>
  <text x="393" y="300" font-size="12" fill="#c9a227">⚜</text>
  <!-- Text lines on doc -->
  <line x1="345" y1="268" x2="460" y2="268" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="345" y1="278" x2="460" y2="278" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="345" y1="288" x2="460" y2="288" stroke="#888" stroke-width="1" opacity="0.5"/>
  <!-- Elven representative (left) - tall, slender -->
  <ellipse cx="260" cy="340" rx="15" ry="7" fill="#001a00"/>
  <rect x="250" y="270" width="20" height="75" fill="#001a00"/>
  <circle cx="260" cy="262" r="15" fill="#001a00"/>
  <!-- Pointed ears suggested -->
  <polygon points="270,258 278,248 274,262" fill="#001a00"/>
  <!-- Dwarven representative (right) - stocky -->
  <ellipse cx="540" cy="345" rx="18" ry="8" fill="#1a0d00"/>
  <rect x="525" y="278" width="30" height="70" fill="#1a0d00"/>
  <circle cx="540" cy="272" r="17" fill="#1a0d00"/>
  <!-- Beard -->
  <ellipse cx="540" cy="290" rx="12" ry="15" fill="#111"/>
  <!-- Handshake over table -->
  <line x1="275" y1="295" x2="330" y2="280" stroke="#001a00" stroke-width="5"/>
  <line x1="525" y1="295" x2="470" y2="280" stroke="#1a0d00" stroke-width="5"/>
  <!-- Hands meeting -->
  <circle cx="400" cy="278" r="12" fill="#0d1a08" opacity="0.8"/>
  <!-- Text overlay -->
  <rect x="0" y="405" width="800" height="45" fill="black" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="14" fill="#c9a227" font-family="Georgia, serif" font-style="italic">Historic Alliance Formed Between Elven City of Silvermoore and Dwarven Forge Cities</text>
</svg>
