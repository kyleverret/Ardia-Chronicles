<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="labGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#003322;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#00ffcc;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0033aa;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Dark lab background -->
  <rect width="800" height="450" fill="#050f10"/>
  <!-- Bookshelf background -->
  <rect x="0" y="0" width="150" height="450" fill="#0a1a1a"/>
  <rect x="650" y="0" width="150" height="450" fill="#0a1a1a"/>
  <!-- Books -->
  <rect x="10" y="20" width="15" height="60" fill="#8b2200"/>
  <rect x="28" y="30" width="12" height="50" fill="#1a3a8b"/>
  <rect x="43" y="25" width="18" height="55" fill="#2a6b2a"/>
  <rect x="64" y="15" width="14" height="65" fill="#6b1a6b"/>
  <rect x="81" y="28" width="16" height="52" fill="#8b6a00"/>
  <rect x="100" y="20" width="13" height="60" fill="#4a2a00"/>
  <rect x="116" y="32" width="15" height="48" fill="#1a6b6b"/>
  <rect x="10" y="110" width="20" height="70" fill="#6b0000"/>
  <rect x="33" y="120" width="14" height="60" fill="#003399"/>
  <rect x="50" y="115" width="17" height="65" fill="#336600"/>
  <rect x="70" y="105" width="15" height="75" fill="#660066"/>
  <rect x="88" y="118" width="18" height="62" fill="#996600"/>
  <rect x="660" y="20" width="15" height="60" fill="#8b2200"/>
  <rect x="678" y="30" width="12" height="50" fill="#1a3a8b"/>
  <rect x="693" y="25" width="18" height="55" fill="#2a6b2a"/>
  <rect x="714" y="15" width="14" height="65" fill="#6b1a6b"/>
  <rect x="731" y="28" width="16" height="52" fill="#8b6a00"/>
  <rect x="750" y="20" width="13" height="60" fill="#4a2a00"/>
  <rect x="766" y="32" width="15" height="48" fill="#1a6b6b"/>
  <!-- Lab glow ambient -->
  <rect x="150" y="0" width="500" height="450" fill="url(#labGlow)"/>
  <!-- Lab table -->
  <rect x="180" y="280" width="440" height="30" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <rect x="200" y="310" width="20" height="100" fill="#111"/>
  <rect x="580" y="310" width="20" height="100" fill="#111"/>
  <!-- Glowing orb on table - central piece -->
  <circle cx="400" cy="240" r="70" fill="url(#orbGlow)" opacity="0.9"/>
  <circle cx="400" cy="240" r="50" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0.8"/>
  <circle cx="400" cy="240" r="30" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.6"/>
  <!-- Orbiting runes -->
  <circle cx="400" cy="240" r="90" fill="none" stroke="#7b2fff" stroke-width="1" stroke-dasharray="5,5"/>
  <circle cx="330" cy="200" r="8" fill="#7b2fff" opacity="0.8"/>
  <text x="327" y="204" font-size="10" fill="white">ᚱ</text>
  <circle cx="470" cy="200" r="8" fill="#7b2fff" opacity="0.8"/>
  <text x="467" y="204" font-size="10" fill="white">ᚢ</text>
  <circle cx="400" cy="148" r="8" fill="#7b2fff" opacity="0.8"/>
  <text x="397" y="152" font-size="10" fill="white">ᚾ</text>
  <circle cx="340" cy="290" r="8" fill="#00ffcc" opacity="0.8"/>
  <circle cx="460" cy="290" r="8" fill="#00ffcc" opacity="0.8"/>
  <!-- Scientist figure (silhouette) -->
  <ellipse cx="280" cy="340" rx="20" ry="10" fill="#050f10"/>
  <rect x="270" y="260" width="20" height="80" fill="#050f10"/>
  <circle cx="280" cy="255" r="15" fill="#050f10"/>
  <!-- Pointing hand/staff -->
  <line x1="290" y1="280" x2="350" y2="260" stroke="#050f10" stroke-width="3"/>
  <!-- Magic particles -->
  <circle cx="250" cy="200" r="3" fill="#00ffcc" opacity="0.7"/>
  <circle cx="220" cy="150" r="2" fill="#7b2fff" opacity="0.6"/>
  <circle cx="550" cy="180" r="3" fill="#00ffcc" opacity="0.7"/>
  <circle cx="580" cy="130" r="2" fill="#7b2fff" opacity="0.6"/>
  <circle cx="500" cy="320" r="2" fill="#00ffcc" opacity="0.5"/>
  <!-- Text overlay -->
  <rect x="0" y="390" width="800" height="60" fill="black" opacity="0.7"/>
  <text x="400" y="420" text-anchor="middle" font-size="16" fill="#00ffcc" font-family="Georgia, serif" font-style="italic">Arcane Academy: New Spell Matrix Discovery Could Revolutionize Healing</text>
</svg>
