<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="stormEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="30%" style="stop-color:#aaaaff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0000aa;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001144;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000022;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Dark stormy sky -->
  <rect width="800" height="450" fill="#000011"/>
  <!-- Storm cloud mass -->
  <ellipse cx="400" cy="150" rx="350" ry="130" fill="#0a0a22" opacity="0.95"/>
  <ellipse cx="350" cy="130" rx="200" ry="100" fill="#111133" opacity="0.9"/>
  <ellipse cx="450" cy="120" rx="250" ry="110" fill="#0d0d2a" opacity="0.9"/>
  <!-- Magical storm eye -->
  <circle cx="400" cy="170" r="80" fill="url(#stormEye)"/>
  <circle cx="400" cy="170" r="60" fill="none" stroke="#aaaaff" stroke-width="2" opacity="0.7"/>
  <circle cx="400" cy="170" r="40" fill="none" stroke="#aaaaff" stroke-width="1.5" opacity="0.5"/>
  <!-- Swirling cloud lines -->
  <path d="M200,170 C250,130 300,200 350,150 C380,120 410,200 450,170 C490,140 540,200 600,160" stroke="#334488" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M150,200 C220,160 280,230 350,190 C390,165 430,230 480,195 C530,160 590,220 650,185" stroke="#223366" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- Lightning bolts -->
  <polyline points="350,120 340,160 360,165 330,220" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.9"/>
  <polyline points="440,110 430,150 450,158 420,210" stroke="#aaaaff" stroke-width="2" fill="none" opacity="0.8"/>
  <polyline points="280,140 270,175 285,180 260,230" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Magic rune sparks in eye -->
  <text x="385" y="160" font-size="16" fill="#ffffff" opacity="0.8">ᚱ</text>
  <text x="405" y="185" font-size="14" fill="#aaaaff" opacity="0.7">ᚢ</text>
  <text x="378" y="185" font-size="14" fill="#aaaaff" opacity="0.7">ᚾ</text>
  <!-- Ocean waves below -->
  <rect x="0" y="300" width="800" height="150" fill="url(#oceanGrad)"/>
  <path d="M0,310 C100,295 200,325 300,305 C400,285 500,320 600,300 C700,280 750,315 800,300 L800,450 L0,450 Z" fill="#001133" opacity="0.8"/>
  <path d="M0,330 C80,315 160,345 260,325 C360,305 460,340 560,320 C660,300 720,335 800,318 L800,450 L0,450 Z" fill="#000822"/>
  <!-- Mage ships in ocean (tiny) -->
  <polygon points="250,330 255,310 260,330" fill="#555"/>
  <rect x="247" y="325" width="16" height="8" fill="#333"/>
  <polygon points="530,335 535,315 540,335" fill="#555"/>
  <rect x="527" y="330" width="16" height="8" fill="#333"/>
  <!-- Text overlay -->
  <rect x="0" y="405" width="800" height="45" fill="black" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="14" fill="#aaaaff" font-family="Georgia, serif" font-style="italic">Unprecedented Arcane Storm Forming Over the Arcane Sea; Mages Baffled</text>
</svg>
