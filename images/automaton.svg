<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="factoryBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a0a;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#factoryBg)"/>
  <!-- Factory interior beams -->
  <rect x="100" y="0" width="10" height="450" fill="#1a1a1a"/>
  <rect x="250" y="0" width="10" height="450" fill="#1a1a1a"/>
  <rect x="540" y="0" width="10" height="450" fill="#1a1a1a"/>
  <rect x="690" y="0" width="10" height="450" fill="#1a1a1a"/>
  <!-- Assembly line belt -->
  <rect x="0" y="320" width="800" height="30" fill="#222" stroke="#444" stroke-width="1"/>
  <line x1="0" y1="332" x2="800" y2="332" stroke="#333" stroke-width="1" stroke-dasharray="20,10"/>
  <!-- Automaton 1 (completed) - large -->
  <rect x="300" y="180" width="80" height="100" fill="#3a3a3a" rx="5"/>
  <rect x="310" y="160" width="60" height="30" fill="#2a2a2a" rx="5"/>
  <!-- Eyes glowing -->
  <circle cx="330" cy="173" r="8" fill="url(#eyeGlow)"/>
  <circle cx="350" cy="173" r="8" fill="url(#eyeGlow)"/>
  <circle cx="330" cy="173" r="4" fill="#ff6600"/>
  <circle cx="350" cy="173" r="4" fill="#ff6600"/>
  <!-- Chest rune panel -->
  <rect x="315" y="195" width="50" height="40" fill="#1a1a1a" rx="3"/>
  <text x="325" y="218" font-size="14" fill="#ff6600" opacity="0.8">⚙</text>
  <!-- Arms -->
  <rect x="265" y="185" width="35" height="15" fill="#3a3a3a" rx="5"/>
  <rect x="380" y="185" width="35" height="15" fill="#3a3a3a" rx="5"/>
  <!-- Legs -->
  <rect x="315" y="280" width="20" height="50" fill="#3a3a3a"/>
  <rect x="345" y="280" width="20" height="50" fill="#3a3a3a"/>
  <!-- Feet -->
  <rect x="310" y="325" width="28" height="12" fill="#2a2a2a" rx="3"/>
  <rect x="340" y="325" width="28" height="12" fill="#2a2a2a" rx="3"/>
  <!-- Automaton 2 (smaller, being assembled) -->
  <rect x="470" y="230" width="60" height="80" fill="#3a3a3a" rx="5" opacity="0.7"/>
  <rect x="478" y="215" width="44" height="25" fill="#2a2a2a" rx="5" opacity="0.7"/>
  <circle cx="493" cy="226" r="6" fill="#555" opacity="0.8"/>
  <circle cx="509" cy="226" r="6" fill="#555" opacity="0.8"/>
  <!-- Mechanical arms above (assembly mechanism) -->
  <rect x="150" y="100" width="500" height="10" fill="#2a2a2a"/>
  <rect x="340" y="110" width="10" height="70" fill="#333"/>
  <rect x="490" y="110" width="10" height="70" fill="#333"/>
  <rect x="330" y="175" width="30" height="15" fill="#444" rx="3"/>
  <rect x="480" y="175" width="30" height="15" fill="#444" rx="3"/>
  <!-- Smoke/steam -->
  <ellipse cx="160" cy="60" rx="25" ry="20" fill="#333" opacity="0.6"/>
  <ellipse cx="155" cy="40" rx="20" ry="15" fill="#2a2a2a" opacity="0.5"/>
  <ellipse cx="640" cy="55" rx="25" ry="20" fill="#333" opacity="0.6"/>
  <ellipse cx="645" cy="35" rx="20" ry="15" fill="#2a2a2a" opacity="0.5"/>
  <!-- Forge worker silhouette -->
  <ellipse cx="200" cy="350" rx="15" ry="7" fill="#080808"/>
  <rect x="190" y="310" width="20" height="45" fill="#080808"/>
  <circle cx="200" cy="305" r="13" fill="#080808"/>
  <!-- Text overlay -->
  <rect x="0" y="405" width="800" height="45" fill="black" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="14" fill="#ff6600" font-family="Georgia, serif" font-style="italic">First Automaton Factory Opens in Industrial Quarter of Forge City Ironhaven</text>
</svg>
