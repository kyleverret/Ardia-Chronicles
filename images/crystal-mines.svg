<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="mineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050510;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="crystalGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="crystalGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#aa00ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#550088;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#mineGrad)"/>
  <!-- Cave walls -->
  <polygon points="0,0 0,300 100,250 150,300 0,450 0,0" fill="#111118"/>
  <polygon points="800,0 800,300 700,260 650,300 800,450 800,0" fill="#111118"/>
  <polygon points="0,0 200,80 300,50 400,90 500,40 600,70 800,0 800,0 0,0" fill="#111118"/>
  <!-- Rock formations -->
  <polygon points="50,400 80,330 110,390 130,310 160,400" fill="#1a1a28"/>
  <polygon points="600,420 640,350 670,410 700,340 740,430" fill="#1a1a28"/>
  <!-- Large crystals - blue -->
  <polygon points="250,350 240,200 260,350" fill="#00aaff" opacity="0.85"/>
  <polygon points="250,350 265,210 280,350" fill="#0088cc" opacity="0.8"/>
  <polygon points="265,350 270,230 290,350" fill="#00aaff" opacity="0.7"/>
  <!-- Crystal glow -->
  <ellipse cx="265" cy="280" rx="50" ry="80" fill="url(#crystalGlow1)" opacity="0.6"/>
  <!-- Large crystals - purple -->
  <polygon points="520,380 510,230 530,380" fill="#aa00ff" opacity="0.85"/>
  <polygon points="530,380 540,245 555,380" fill="#8800cc" opacity="0.8"/>
  <polygon points="545,375 550,260 565,375" fill="#aa00ff" opacity="0.7"/>
  <!-- Crystal glow purple -->
  <ellipse cx="537" cy="310" rx="50" ry="80" fill="url(#crystalGlow2)" opacity="0.6"/>
  <!-- Scattered ore on ground -->
  <polygon points="350,400 360,370 370,400" fill="#00aaff" opacity="0.6"/>
  <polygon points="390,410 398,385 408,410" fill="#aa00ff" opacity="0.6"/>
  <polygon points="430,405 438,382 448,405" fill="#00ffaa" opacity="0.5"/>
  <!-- Mining tools silhouette -->
  <rect x="170" y="360" width="8" height="60" fill="#333"/>
  <polygon points="166,360 178,360 172,345" fill="#555"/>
  <rect x="400" y="355" width="8" height="65" fill="#333"/>
  <polygon points="396,355 408,355 402,340" fill="#555"/>
  <!-- Miner silhouettes -->
  <ellipse cx="190" cy="395" rx="15" ry="8" fill="#0a0a15"/>
  <rect x="184" y="365" width="12" height="30" fill="#0a0a15"/>
  <circle cx="190" cy="360" r="10" fill="#0a0a15"/>
  <!-- Pick swinging -->
  <line x1="196" y1="370" x2="215" y2="355" stroke="#0a0a15" stroke-width="3"/>
  <ellipse cx="370" cy="395" rx="15" ry="8" fill="#0a0a15"/>
  <rect x="364" y="365" width="12" height="30" fill="#0a0a15"/>
  <circle cx="370" cy="360" r="10" fill="#0a0a15"/>
  <!-- Mine cart -->
  <rect x="440" y="380" width="60" height="30" fill="#333" rx="3"/>
  <circle cx="455" cy="412" r="8" fill="#555"/>
  <circle cx="485" cy="412" r="8" fill="#555"/>
  <!-- Crystal in cart glowing -->
  <polygon points="460,380 470,360 480,380" fill="#00aaff" opacity="0.8"/>
  <!-- Text overlay -->
  <rect x="0" y="405" width="800" height="45" fill="black" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="15" fill="#00aaff" font-family="Georgia, serif" font-style="italic">Crystal Ore Prices Skyrocket as Mining Guilds Announce Production Cuts</text>
</svg>
