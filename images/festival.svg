<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="festGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#4400aa;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050010;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#150030;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Night sky -->
  <rect width="800" height="450" fill="url(#nightSky)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="120" cy="60" r="1" fill="white" opacity="0.7"/>
  <circle cx="220" cy="25" r="2" fill="white" opacity="0.9"/>
  <circle cx="350" cy="15" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="500" cy="35" r="1" fill="white" opacity="0.8"/>
  <circle cx="650" cy="20" r="2" fill="white" opacity="0.7"/>
  <circle cx="750" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="180" cy="80" r="1" fill="white" opacity="0.5"/>
  <circle cx="420" cy="50" r="1.5" fill="#ffdd00" opacity="0.9"/>
  <circle cx="580" cy="70" r="1" fill="white" opacity="0.7"/>
  <!-- Festival glow -->
  <ellipse cx="400" cy="200" rx="350" ry="200" fill="url(#festGlow)"/>
  <!-- City buildings silhouette background -->
  <rect x="0" y="200" width="100" height="250" fill="#0a0015"/>
  <rect x="80" y="170" width="60" height="280" fill="#0a0015"/>
  <rect x="130" y="220" width="40" height="230" fill="#0a0015"/>
  <rect x="620" y="210" width="50" height="240" fill="#0a0015"/>
  <rect x="660" y="175" width="70" height="275" fill="#0a0015"/>
  <rect x="720" y="200" width="80" height="250" fill="#0a0015"/>
  <!-- Glowing lanterns floating upward -->
  <circle cx="300" cy="180" r="15" fill="#ff9900" opacity="0.9"/>
  <circle cx="300" cy="180" r="18" fill="#ff9900" opacity="0.3"/>
  <rect x="297" y="195" width="6" height="12" fill="#cc7700" opacity="0.7"/>
  <circle cx="400" cy="130" r="18" fill="#ff6600" opacity="0.9"/>
  <circle cx="400" cy="130" r="22" fill="#ff6600" opacity="0.3"/>
  <rect x="397" y="148" width="6" height="14" fill="#cc4400" opacity="0.7"/>
  <circle cx="500" cy="160" r="15" fill="#ffcc00" opacity="0.9"/>
  <circle cx="500" cy="160" r="18" fill="#ffcc00" opacity="0.3"/>
  <rect x="497" y="175" width="6" height="12" fill="#cc9900" opacity="0.7"/>
  <circle cx="230" cy="140" r="12" fill="#ff33aa" opacity="0.8"/>
  <circle cx="570" cy="120" r="12" fill="#33aaff" opacity="0.8"/>
  <circle cx="350" cy="90" r="10" fill="#aa33ff" opacity="0.8"/>
  <circle cx="450" cy="100" r="14" fill="#ff9900" opacity="0.8"/>
  <circle cx="250" cy="70" r="8" fill="#33ffaa" opacity="0.7"/>
  <circle cx="600" cy="80" r="10" fill="#ff6600" opacity="0.8"/>
  <!-- Crowd at festival ground -->
  <rect x="100" y="330" width="600" height="70" fill="#080018"/>
  <!-- Magic starweaving particles -->
  <circle cx="200" cy="300" r="4" fill="#aa33ff" opacity="0.9"/>
  <circle cx="260" cy="280" r="3" fill="#33aaff" opacity="0.8"/>
  <circle cx="350" cy="270" r="5" fill="#ffdd00" opacity="0.9"/>
  <circle cx="420" cy="260" r="3" fill="#ff33aa" opacity="0.8"/>
  <circle cx="500" cy="275" r="4" fill="#33ffcc" opacity="0.9"/>
  <circle cx="580" cy="285" r="3" fill="#aa33ff" opacity="0.8"/>
  <!-- Festival stage -->
  <rect x="300" y="290" width="200" height="50" fill="#1a0030"/>
  <rect x="295" y="285" width="210" height="10" fill="#c9a227"/>
  <!-- Performer glow on stage -->
  <circle cx="400" cy="295" r="20" fill="#ffdd00" opacity="0.5"/>
  <ellipse cx="400" cy="315" rx="12" ry="8" fill="#0a0020"/>
  <rect x="395" y="295" width="10" height="20" fill="#0a0020"/>
  <!-- Text overlay -->
  <rect x="0" y="400" width="800" height="50" fill="black" opacity="0.7"/>
  <text x="400" y="428" text-anchor="middle" font-size="15" fill="#ffdd00" font-family="Georgia, serif" font-style="italic">Festival of Starweaving Draws Record Crowds to Capital Praxis</text>
</svg>
