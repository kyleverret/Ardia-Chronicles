<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="forestSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a1a;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="treeGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#forestSky)"/>
  <!-- Moon through trees -->
  <circle cx="400" cy="100" r="60" fill="#e8f0d0" opacity="0.3"/>
  <!-- Ancient trees - magical glowing -->
  <!-- Left trees -->
  <rect x="30" y="100" width="40" height="350" fill="#0a1a05"/>
  <ellipse cx="50" cy="80" rx="70" ry="90" fill="#0d2a08" opacity="0.9"/>
  <ellipse cx="50" cy="80" rx="50" ry="70" fill="#0f3a0a"/>
  <!-- Tree glow -->
  <ellipse cx="50" cy="120" rx="60" ry="80" fill="url(#treeGlow)"/>
  <!-- Glowing runes on trunk -->
  <text x="42" y="200" font-size="12" fill="#00ff88" opacity="0.7">ᚱ</text>
  <text x="42" y="220" font-size="12" fill="#00ff88" opacity="0.6">ᚢ</text>
  <rect x="130" y="130" width="35" height="320" fill="#0a1a05"/>
  <ellipse cx="147" cy="110" rx="60" ry="80" fill="#0d2a08" opacity="0.9"/>
  <ellipse cx="147" cy="110" rx="45" ry="60" fill="#0f3a0a"/>
  <text x="139" y="210" font-size="12" fill="#00ff88" opacity="0.7">ᚾ</text>
  <!-- Right trees -->
  <rect x="630" y="110" width="40" height="340" fill="#0a1a05"/>
  <ellipse cx="650" cy="90" rx="70" ry="85" fill="#0d2a08" opacity="0.9"/>
  <ellipse cx="650" cy="90" rx="50" ry="65" fill="#0f3a0a"/>
  <ellipse cx="650" cy="130" rx="60" ry="80" fill="url(#treeGlow)"/>
  <text x="642" y="200" font-size="12" fill="#00ff88" opacity="0.7">ᚱ</text>
  <rect x="720" y="120" width="35" height="330" fill="#0a1a05"/>
  <ellipse cx="737" cy="100" rx="65" ry="80" fill="#0d2a08" opacity="0.9"/>
  <!-- Forest floor with roots -->
  <ellipse cx="50" cy="450" rx="80" ry="20" fill="#0a1a05"/>
  <ellipse cx="650" cy="450" rx="80" ry="20" fill="#0a1a05"/>
  <!-- Developers/threat - machines in background -->
  <rect x="280" y="280" width="80" height="100" fill="#2a2a2a"/>
  <rect x="420" y="260" width="100" height="120" fill="#2a2a2a"/>
  <!-- Machine gears -->
  <circle cx="320" cy="300" r="20" fill="none" stroke="#888" stroke-width="3"/>
  <circle cx="470" cy="300" r="25" fill="none" stroke="#888" stroke-width="3"/>
  <!-- Smoke stacks -->
  <rect x="300" y="240" width="12" height="50" fill="#1a1a1a"/>
  <rect x="440" y="220" width="15" height="60" fill="#1a1a1a"/>
  <!-- Black smoke -->
  <ellipse cx="306" cy="230" rx="20" ry="15" fill="#111" opacity="0.8"/>
  <ellipse cx="300" cy="210" rx="25" ry="18" fill="#0a0a0a" opacity="0.7"/>
  <ellipse cx="447" cy="208" rx="22" ry="15" fill="#111" opacity="0.8"/>
  <ellipse cx="440" cy="188" rx="28" ry="18" fill="#0a0a0a" opacity="0.7"/>
  <!-- Protest banners -->
  <rect x="200" y="310" width="5" height="70" fill="#333"/>
  <rect x="200" y="310" width="60" height="25" fill="#004400"/>
  <text x="220" y="327" font-size="10" fill="#00ff88">SAVE THE</text>
  <text x="212" y="340" font-size="10" fill="#00ff88">FOREST!</text>
  <!-- Nature spirit (ethereal) in center -->
  <ellipse cx="400" cy="200" rx="30" ry="50" fill="#00ff88" opacity="0.15"/>
  <circle cx="400" cy="165" r="20" fill="#00ff88" opacity="0.1"/>
  <!-- Text overlay -->
  <rect x="0" y="405" width="800" height="45" fill="black" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="14" fill="#00ff88" font-family="Georgia, serif" font-style="italic">Sacred Whispering Forest Under Threat as Developers Eye Ancient Groves</text>
</svg>
