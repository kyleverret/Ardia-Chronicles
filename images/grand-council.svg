<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="colGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7b2fff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="130" cy="70" r="1" fill="white" opacity="0.5"/>
  <circle cx="700" cy="40" r="2" fill="white" opacity="0.7"/>
  <circle cx="750" cy="90" r="1" fill="white" opacity="0.4"/>
  <circle cx="200" cy="20" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="600" cy="25" r="1" fill="white" opacity="0.6"/>
  <!-- Magical glow behind building -->
  <ellipse cx="400" cy="300" rx="300" ry="150" fill="url(#glowGrad)"/>
  <!-- Grand Council Building -->
  <!-- Base platform -->
  <rect x="100" y="340" width="600" height="30" fill="#2a1a4a" stroke="#c9a227" stroke-width="1"/>
  <!-- Steps -->
  <rect x="150" y="320" width="500" height="20" fill="#231540" stroke="#c9a227" stroke-width="0.5"/>
  <rect x="180" y="305" width="440" height="20" fill="#1e1238" stroke="#c9a227" stroke-width="0.5"/>
  <!-- Main building body -->
  <rect x="200" y="160" width="400" height="150" fill="#1a0d38" stroke="#c9a227" stroke-width="2"/>
  <!-- Columns -->
  <rect x="220" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <rect x="265" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <rect x="310" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <rect x="355" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <rect x="400" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <rect x="445" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <rect x="490" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <rect x="535" y="155" width="20" height="155" fill="url(#colGrad)"/>
  <!-- Pediment (triangle roof) -->
  <polygon points="190,160 400,60 610,160" fill="#1a0d38" stroke="#c9a227" stroke-width="2"/>
  <!-- Pediment decoration -->
  <circle cx="400" cy="90" r="20" fill="none" stroke="#c9a227" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle" font-size="18" fill="#c9a227">★</text>
  <!-- Windows with magical glow -->
  <rect x="250" y="200" width="50" height="70" fill="#7b2fff" opacity="0.5" rx="5"/>
  <rect x="375" y="200" width="50" height="70" fill="#7b2fff" opacity="0.5" rx="5"/>
  <rect x="500" y="200" width="50" height="70" fill="#7b2fff" opacity="0.5" rx="5"/>
  <!-- Door -->
  <rect x="370" y="260" width="60" height="50" fill="#c9a227" opacity="0.7" rx="3"/>
  <!-- Banner flags -->
  <line x1="400" y1="60" x2="400" y2="20" stroke="#c9a227" stroke-width="2"/>
  <polygon points="400,20 430,30 400,40" fill="#7b2fff"/>
  <!-- Foreground figures (silhouettes) -->
  <ellipse cx="250" cy="370" rx="15" ry="25" fill="#0a0820"/>
  <ellipse cx="310" cy="372" rx="15" ry="23" fill="#0a0820"/>
  <ellipse cx="490" cy="370" rx="15" ry="25" fill="#0a0820"/>
  <ellipse cx="550" cy="372" rx="15" ry="23" fill="#0a0820"/>
  <!-- Text overlay -->
  <rect x="0" y="390" width="800" height="60" fill="black" opacity="0.6"/>
  <text x="400" y="420" text-anchor="middle" font-size="16" fill="#c9a227" font-family="Georgia, serif" font-style="italic">The Grand Council of Ardia Prime, Capital City of Praxis</text>
</svg>
