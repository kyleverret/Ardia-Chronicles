<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="leyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00aa44;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="oceanDeep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001122;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000811;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Deep ocean darkness -->
  <rect width="800" height="450" fill="url(#oceanDeep)"/>
  <!-- Particles/bioluminescence -->
  <circle cx="80" cy="100" r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="200" cy="50" r="1.5" fill="#0088ff" opacity="0.5"/>
  <circle cx="600" cy="80" r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="720" cy="130" r="1.5" fill="#0088ff" opacity="0.5"/>
  <circle cx="350" cy="30" r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="150" cy="200" r="1.5" fill="#aaffcc" opacity="0.3"/>
  <circle cx="650" cy="180" r="2" fill="#aaffcc" opacity="0.4"/>
  <!-- Ocean floor -->
  <rect x="0" y="360" width="800" height="90" fill="#000a14"/>
  <!-- Rock formations on floor -->
  <polygon points="0,400 50,360 80,390 120,360 150,400" fill="#000810"/>
  <polygon points="620,400 660,360 700,380 730,365 800,400" fill="#000810"/>
  <!-- Ley line network glowing on ocean floor -->
  <!-- Main ley lines -->
  <line x1="0" y1="300" x2="800" y2="280" stroke="#00ff88" stroke-width="3" opacity="0.7"/>
  <line x1="0" y1="340" x2="800" y2="320" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="0" x2="300" y2="450" stroke="#00ff88" stroke-width="2.5" opacity="0.6"/>
  <line x1="500" y1="0" x2="600" y2="450" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="200" x2="800" y2="350" stroke="#00aaff" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="450" x2="700" y2="150" stroke="#00aaff" stroke-width="2" opacity="0.5"/>
  <!-- Intersection nodes (power nexus) -->
  <circle cx="263" cy="290" r="15" fill="#00ff88" opacity="0.8"/>
  <circle cx="263" cy="290" r="25" fill="url(#leyGlow)"/>
  <circle cx="263" cy="290" r="7" fill="white" opacity="0.9"/>
  <circle cx="553" cy="302" r="15" fill="#00ff88" opacity="0.8"/>
  <circle cx="553" cy="302" r="25" fill="url(#leyGlow)"/>
  <circle cx="553" cy="302" r="7" fill="white" opacity="0.9"/>
  <circle cx="400" cy="225" r="20" fill="#00aaff" opacity="0.8"/>
  <circle cx="400" cy="225" r="35" fill="url(#leyGlow)"/>
  <circle cx="400" cy="225" r="10" fill="white" opacity="0.9"/>
  <!-- Research submersible -->
  <ellipse cx="400" cy="160" rx="60" ry="25" fill="#1a2a3a"/>
  <ellipse cx="380" cy="160" rx="50" ry="20" fill="#223344"/>
  <!-- Portholes with light -->
  <circle cx="365" cy="158" r="8" fill="#aaddff" opacity="0.8"/>
  <circle cx="390" cy="158" r="8" fill="#aaddff" opacity="0.8"/>
  <!-- Spotlight beam -->
  <polygon points="390,185 380,230 420,230 410,185" fill="#aaddff" opacity="0.2"/>
  <!-- Propeller -->
  <circle cx="455" cy="160" r="12" fill="none" stroke="#666" stroke-width="2"/>
  <line x1="455" y1="148" x2="455" y2="172" stroke="#666" stroke-width="2"/>
  <line x1="443" y1="160" x2="467" y2="160" stroke="#666" stroke-width="2"/>
  <!-- Text overlay -->
  <rect x="0" y="405" width="800" height="45" fill="black" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="14" fill="#00ff88" font-family="Georgia, serif" font-style="italic">Researchers Uncover Ancient Ley Line Network Beneath Ardia Prime's Oceans</text>
</svg>
