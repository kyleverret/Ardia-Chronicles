<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="spotGrad" cx="50%" cy="0%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#aa5500;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="stageBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0530;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0215;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#stageBg)"/>
  <!-- Stage curtains -->
  <polygon points="0,0 180,0 120,450 0,450" fill="#6a0000"/>
  <polygon points="800,0 620,0 680,450 800,450" fill="#6a0000"/>
  <!-- Curtain folds -->
  <line x1="40" y1="0" x2="10" y2="450" stroke="#550000" stroke-width="3" opacity="0.5"/>
  <line x1="80" y1="0" x2="50" y2="450" stroke="#550000" stroke-width="3" opacity="0.5"/>
  <line x1="120" y1="0" x2="90" y2="450" stroke="#550000" stroke-width="3" opacity="0.5"/>
  <line x1="760" y1="0" x2="790" y2="450" stroke="#550000" stroke-width="3" opacity="0.5"/>
  <line x1="720" y1="0" x2="750" y2="450" stroke="#550000" stroke-width="3" opacity="0.5"/>
  <line x1="680" y1="0" x2="710" y2="450" stroke="#550000" stroke-width="3" opacity="0.5"/>
  <!-- Stage floor -->
  <rect x="120" y="320" width="560" height="130" fill="#1a1015"/>
  <rect x="120" y="318" width="560" height="8" fill="#2a1020"/>
  <!-- Spotlight -->
  <polygon points="400,0 340,320 460,320" fill="url(#spotGrad)" opacity="0.7"/>
  <!-- Performer on stage -->
  <ellipse cx="400" cy="360" rx="18" ry="8" fill="#150020"/>
  <rect x="388" y="295" width="24" height="70" fill="#150020"/>
  <circle cx="400" cy="288" r="18" fill="#150020"/>
  <!-- Performer gown flare -->
  <polygon points="388,360 375,380 388,365 412,365 425,380 412,360" fill="#3a0055" opacity="0.8"/>
  <!-- Staff/wand raised -->
  <line x1="415" y1="310" x2="450" y2="270" stroke="#150020" stroke-width="3"/>
  <!-- Magic sparks from wand -->
  <circle cx="453" cy="267" r="8" fill="#aa33ff" opacity="0.9"/>
  <circle cx="465" cy="255" r="5" fill="#ff33aa" opacity="0.8"/>
  <circle cx="475" cy="270" r="4" fill="#33aaff" opacity="0.8"/>
  <!-- Void/magical backdrop (title 'Songs of the Void') -->
  <circle cx="400" cy="160" r="90" fill="black" opacity="0.7"/>
  <circle cx="400" cy="160" r="70" fill="none" stroke="#aa33ff" stroke-width="2" opacity="0.8"/>
  <!-- Stars in void circle -->
  <circle cx="380" cy="140" r="2" fill="white" opacity="0.8"/>
  <circle cx="420" cy="145" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="395" cy="175" r="2" fill="white" opacity="0.8"/>
  <circle cx="415" cy="130" r="1" fill="white" opacity="0.6"/>
  <circle cx="370" cy="170" r="1.5" fill="white" opacity="0.7"/>
  <!-- Musical notes floating -->
  <text x="200" y="250" font-size="24" fill="#c9a227" opacity="0.6">♫</text>
  <text x="560" y="230" font-size="20" fill="#c9a227" opacity="0.6">♪</text>
  <text x="250" y="200" font-size="16" fill="#c9a227" opacity="0.5">♩</text>
  <text x="520" y="280" font-size="18" fill="#c9a227" opacity="0.5">♬</text>
  <!-- Audience silhouettes at bottom -->
  <rect x="120" y="410" width="560" height="40" fill="#0a0810"/>
  <circle cx="200" cy="415" r="8" fill="#050508"/>
  <circle cx="240" cy="412" r="8" fill="#050508"/>
  <circle cx="320" cy="415" r="8" fill="#050508"/>
  <circle cx="400" cy="413" r="8" fill="#050508"/>
  <circle cx="480" cy="415" r="8" fill="#050508"/>
  <circle cx="560" cy="412" r="8" fill="#050508"/>
  <circle cx="600" cy="415" r="8" fill="#050508"/>
  <!-- Text overlay -->
  <rect x="0" y="405" width="800" height="45" fill="black" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="14" fill="#aa33ff" font-family="Georgia, serif" font-style="italic">Grand Ardia Opera House to Premiere 'Songs of the Void' Next Month</text>
</svg>
